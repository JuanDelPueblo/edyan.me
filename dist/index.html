<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="./main.css">
  <title>Edyan Cruz</title>
</head>

<body>
  <div class="d-flex justify-content-center align-items-center vw-auto vh-100 fixed-top" id="anim-bg">
    <div class="flex-column align-items-center">
      <div class="container p-4 text-bg-light rounded">
        <div class="tab-content" id="content">
          <div class="tab-pane fade show active" id="home-tab-pane" role="tabpanel" aria-labelledby="home-tab" tabindex="0">
            <h1>Edyan Cruz</h1>
            <p>Student of University of Puerto Rico Mayagüez</p>
          </div>
          <div class="tab-pane fade" id="projects-tab-pane" role="tabpanel" aria-labelledby="projects-tab" tabindex="0">
            <h1>Projects</h1>
            <p>My projects</p>
          </div>
          <div class="tab-pane fade" id="contact-tab-pane" role="tabpanel" aria-labelledby="contact-tab" tabindex="0">
            <h1>Contact</h1>
            <p>My contact info</p>
          </div>
        </div>
        <ul class="nav nav-pills nav-fill">
          <li class="nav-item" role="presentation">
            <button class="nav-link active" id="home-tab" data-bs-toggle="tab" data-bs-target="#home-tab-pane" type="button" role="tab" aria-controls="home-tab-pane" aria-selected="true">Home</button>
          </li>
          <li class="nav-item" role="presentation">
            <button class="nav-link" id="projects-tab" data-bs-toggle="tab" data-bs-target="#projects-tab-pane" type="button" role="tab" aria-controls="projects-tab-pane" aria-selected="false">Projects</button>
          </li>
          <li class="nav-item" role="presentation">
            <button class="nav-link" id="contact-tab" data-bs-toggle="tab" data-bs-target="#contact-tab-pane" type="button" role="tab" aria-controls="contact-tab-pane" aria-selected="false">Contact me</button>
          </li>
          <li class="nav-item" role="presentation">
            <a class="nav-link" id="resume-link"  href="https://edyan.me/resume_edyan.pdf">Resume</a>
          </li>
        </ul>
      </div>
    </div>
  </div>
  <script src="./main.js"></script>
</body>

</html>
